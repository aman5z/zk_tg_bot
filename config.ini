[mdb]
# Network path to the MDB file (SMB UNC or local/mounted path)
# UNC  : //10.20.141.17/d/Attendance database/attBackup23.12.25.mdb
# Mount: /mnt/attdb/attBackup23.12.25.mdb
# Win  : C:/Attendance/att.mdb
path = /mnt/attdb/Attendance database/attBackup23.12.25.mdb
# SMB credentials (leave blank if guest/no auth)
smb_user =
smb_pass =
smb_domain = WORKGROUP
# Local mount point (used if pysmb/cifs not available, mount manually)
mount_point = /mnt/attdb

[devices]
# Comma-separated ZK device IPs
ips = 10.20.141.21,10.20.141.22,10.20.141.23,10.20.141.24,10.20.141.25,10.20.141.26,10.20.141.27,10.20.141.28,10.20.141.29
port = 4370
timeout = 10
# Human-readable names matching IPs above (same order)
names = Girls 2,Boys 2,Boys 1,Girls 1,Boys 3,Boys 4,Girls 3,Girls 4,KG1

[departments]
# Departments to exclude from absent/present counts
exclude = DELETED EMPLOYEES,TRANSPORT,GAES,GULF ASIAN ENGLISH SCHOOL

[attendance]
# Shift start time used for /late command (24h HH:MM)
# Staff (Sun–Thu): 07:30 | Teachers (Mon–Thu): 07:30 — adjust as needed
shift_start = 07:30

[notifications]
# Send punch notification for every punch (can be noisy)
notify_punches = 0
# Send device online/offline alerts
notify_device_status = 1
# Daily absent report time (24h)
daily_report_hour = 8
daily_report_minute = 10

[reports]
# Where to save exported XLSX reports temporarily
export_dir = /tmp/zk_reports
